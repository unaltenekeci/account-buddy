name: Build Windows EXE

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyinstaller pystray Pillow

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name "AccountabilityBuddy" --icon NONE --add-data "accountability_buddy.py;." accountability_buddy.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AccountabilityBuddy-Windows
          path: dist/AccountabilityBuddy.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/AccountabilityBuddy.exe
          generate_release_notes: true
